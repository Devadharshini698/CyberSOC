# CyberSOCEnv — Enterprise Cybersecurity Operations Center
# OpenEnv environment manifest
# 1003 tasks: 3 curated benchmarks + 1000 procedurally generated scenarios

name: cybersocenv
description: >
  Enterprise SOC Incident Response environment. Agents respond to
  simulated SIEM/EDR alerts on a ~75 active node network, containing threats
  (ransomware, lateral movement, APT/C2, data exfiltration) while
  minimizing business downtime. 1003 unique deterministic scenarios.

tags:
  - openenv
  - cybersecurity
  - soc
  - incident-response

